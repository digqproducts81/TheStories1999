<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Amount</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:#1e1e1e;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:320px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      margin-bottom:10px;
      font-size:32px;
    }

    p{
      color:#aaa;
    }

    .amount{
      font-size:50px;
      margin:20px 0;
      font-weight:bold;
      color:#00ff99;
    }

    button{
      background:#00ff99;
      color:black;
      border:none;
      padding:14px 25px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>

  <div class="card">
    <p>Payment Request</p>

    <div class="amount" id="amount">
      Loading...
    </div>

    <button>Pay Now</button>
  </div>

  <script>
    // Get path from URL
    // Example:
    // myproject192.vercel.app/109

    const path = window.location.pathname;

    // Remove "/"
    const rawAmount = path.replace("/", "");

    // If empty
    const amount = rawAmount || "0";

    // Show amount
    document.getElementById("amount").innerText = "€" + amount;
  </script>

</body>
</html>
